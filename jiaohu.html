<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式粒子游乐场</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            /* 深色背景让粒子更显眼 */
            overflow: hidden;
            /* 防止出现滚动条 */
            font-family: sans-serif;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
            /* 让鼠标点击能穿透文字作用于画布 */
            user-select: none;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <div id="ui">
        <h2>交互式粒子</h2>
        <p>1. 移动鼠标吸引粒子</p>
        <p>2. 点击鼠标引发爆炸</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];

        // 鼠标对象
        const mouse = {
            x: undefined,
            y: undefined,
            radius: 150,
            clicked: false
        };

        // 调整画布大小
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 监听鼠标事件
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mousedown', () => { mouse.clicked = true; });
        window.addEventListener('mouseup', () => { mouse.clicked = false; });
        window.addEventListener('mouseleave', () => {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // 粒子类
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.vx = 0;
                this.vy = 0;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                // 鼠标交互逻辑
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // 力场计算
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;

                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    if (mouse.clicked) {
                        // 点击爆炸斥力
                        this.vx -= directionX * 5;
                        this.vy -= directionY * 5;
                    } else {
                        // 移动吸引力
                        this.vx += directionX * 0.5;
                        this.vy += directionY * 0.5;
                    }
                } else {
                    // 回归初始位置的引力
                    if (this.x !== this.baseX) {
                        let dxBase = this.x - this.baseX;
                        this.vx -= dxBase * 0.05;
                    }
                    if (this.y !== this.baseY) {
                        let dyBase = this.y - this.baseY;
                        this.vy -= dyBase * 0.05;
                    }
                }

                // 添加摩擦力
                this.vx *= 0.85;
                this.vy *= 0.85;

                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        // 初始化粒子群
        function init() {
            particles = [];
            let numberOfParticles = (width * height) / 4000; // 根据屏幕大小决定粒子数量
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>

</html>
